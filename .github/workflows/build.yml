# Z-CPP CI/CD — 自动构建 Windows & Linux 安装包
#
# 每次推送至 main 或创建 tag 时触发：
#   - 编译 Rust 后端（release 模式）
#   - 构建 React 前端（production 模式）
#   - 打包为平台专属压缩包（内含启动脚本）
#   - 上传为 GitHub Actions Artifact
#   - 打 tag 时自动发布为 GitHub Release（带使用说明）
#
# ⚠ 提交规范：每次修改代码后必须通过 SSH 推送至 GitHub

name: Build & Package

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "20"

jobs:
  ###############################################################
  # 前端构建
  ###############################################################
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  ###############################################################
  # Linux 构建 (x86_64)
  ###############################################################
  build-linux:
    name: Linux (x86_64)
    needs: build-frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install GCC & Clang
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq g++ clang

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}

      - name: Build backend (release)
        run: cargo build --release

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Assemble & package
        run: |
          PKG="z-cpp-linux-x86_64"
          mkdir -p "$PKG/frontend/dist" "$PKG/workspace"

          cp target/release/z-cpp-backend "$PKG/"
          cp -r frontend/dist/* "$PKG/frontend/dist/"
          cp ../README.md "$PKG/"

          # 启动脚本
          cat > "$PKG/start.sh" << 'EOF'
#!/usr/bin/env bash
set -euo pipefail
PORT="${1:-3000}"
DIR="$(cd "$(dirname "$0")" && pwd)"
cd "$DIR"
mkdir -p workspace
export ZCPP_MODE=production
echo "========================================="
echo "  Z-CPP 轻量级 C/C++ IDE"
echo "  端口: $PORT  |  工作目录: $DIR/workspace"
echo "  浏览器打开: http://localhost:$PORT"
echo "========================================="
exec "$DIR/z-cpp-backend" --port "$PORT"
EOF
          chmod +x "$PKG/start.sh"

          tar czf "${PKG}.tar.gz" "$PKG/"

      # 上传到 repo 根目录对应的路径，Release 直接引用
      - name: Upload tar.gz
        uses: actions/upload-artifact@v4
        with:
          name: linux-package
          path: backend/z-cpp-linux-x86_64.tar.gz
          retention-days: 7
          if-no-files-found: error

  ###############################################################
  # Windows 构建 (x86_64)
  ###############################################################
  build-windows:
    name: Windows (x86_64)
    needs: build-frontend
    runs-on: windows-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM/Clang
        run: choco install llvm -y --no-progress --limit-output
        shell: powershell

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}

      - name: Build backend (release)
        run: cargo build --release

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Assemble & package
        shell: powershell
        run: |
          $pkg = "z-cpp-windows-x86_64"
          New-Item -ItemType Directory -Path "$pkg\frontend\dist" -Force | Out-Null
          New-Item -ItemType Directory -Path "$pkg\workspace" -Force | Out-Null

          Copy-Item "target\release\z-cpp-backend.exe" "$pkg\"
          Copy-Item "frontend\dist\*" "$pkg\frontend\dist\" -Recurse
          Copy-Item "..\README.md" "$pkg\"

          $bat = @'
@echo off
set PORT=%1
if "%PORT%"=="" set PORT=3000
cd /d "%~dp0"
if not exist workspace mkdir workspace
set ZCPP_MODE=production
echo ========================================
echo   Z-CPP 轻量级 C/C++ IDE
echo   端口: %PORT%  ^|  工作目录: %CD%\workspace
echo   浏览器打开: http://localhost:%PORT%
echo ========================================
.\z-cpp-backend.exe --port %PORT%
if %ERRORLEVEL% NEQ 0 ( echo. & echo 程序退出码: %ERRORLEVEL% & pause )
'@
          $bat | Out-File -FilePath "$pkg\start.bat" -Encoding ASCII

          Compress-Archive -Path "$pkg\*" -DestinationPath "${pkg}.zip"

      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: backend/z-cpp-windows-x86_64.zip
          retention-days: 7
          if-no-files-found: error

  ###############################################################
  # GitHub Release (仅在打 tag 时触发)
  ###############################################################
  release:
    name: 📦 Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux package
        uses: actions/download-artifact@v4
        with:
          name: linux-package
          path: release-files/

      - name: Download Windows package
        uses: actions/download-artifact@v4
        with:
          name: windows-package
          path: release-files/

      - name: List release files
        run: ls -lh release-files/

      - name: Generate release body
        run: |
          cat > release-body.md << 'EOF'
          ## 🚀 Z-CPP 轻量级 C/C++ IDE

          > 面向算法竞赛选手的单文件 C/C++ 集成开发环境。

          ### 📦 安装包说明

          | 文件 | 平台 | 用法 |
          |------|------|------|
          | `z-cpp-linux-x86_64.tar.gz` | Linux | 解压 → `./start.sh` |
          | `z-cpp-windows-x86_64.zip`  | Windows | 解压 → 双击 `start.bat` |

          ### 🛠 系统要求

          - **编译器**：系统需预装 **GCC (g++)** 或 **Clang (clang++)**
            - Linux: `sudo apt install g++` 或 `sudo apt install clang`
            - Windows MinGW: 下载 [MinGW-w64](https://www.mingw-w64.org/) 或使用 WSL
          - **浏览器**：Chrome / Edge / Firefox 最新版

          ### 💡 快速开始

          ```bash
          # Linux
          tar xzf z-cpp-linux-x86_64.tar.gz
          cd z-cpp-linux-x86_64
          ./start.sh

          # Windows — 解压后双击 start.bat
          ```

          浏览器打开 **http://localhost:3000** 即可开始写代码！

          ### ✨ 功能

          - Monaco Editor 代码编辑（语法高亮、行号）
          - GCC / Clang 编译器切换
          - 单文件编译运行 + 仅编译模式
          - 运行时间显示
          - 暗色主题，竞赛风格

          ---
          *自动发布 by GitHub Actions*
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-body.md
          files: |
            release-files/z-cpp-linux-x86_64.tar.gz
            release-files/z-cpp-windows-x86_64.zip
          generate_release_notes: true
          draft: false
          prerelease: false
