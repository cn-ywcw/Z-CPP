# Z-CPP CI/CD — 自动构建 Windows & Linux 安装包
#
# 每次推送至 main 或创建 tag 时触发：
#   - 编译 Rust 后端（release 模式）
#   - 构建 React 前端（production 模式）
#   - 打包为平台专属压缩包（内含启动脚本）
#   - 上传为 GitHub Actions Artifact
#   - 打 tag 时自动发布为 GitHub Release
#
# ⚠ 提交规范：每次修改代码后必须通过 SSH 推送至 GitHub

name: Build & Package

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "20"

jobs:
  ###############################################################
  # 前端构建 (在 Ubuntu 上构建，产出给两个平台复用)
  ###############################################################
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 3

  ###############################################################
  # Linux 构建 (x86_64)
  ###############################################################
  build-linux:
    name: Linux (x86_64)
    needs: build-frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GCC & Clang
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq g++ clang

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build backend (release)
        run: cargo build --release

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Assemble package
        run: |
          RELEASE_DIR="z-cpp-linux-x86_64"
          mkdir -p "$RELEASE_DIR/frontend/dist"
          mkdir -p "$RELEASE_DIR/workspace"

          # 拷贝后端二进制
          cp target/release/z-cpp-backend "$RELEASE_DIR/"
          # 拷贝前端构建产物
          cp -r frontend/dist/* "$RELEASE_DIR/frontend/dist/"
          # 拷贝 README
          cp ../README.md "$RELEASE_DIR/"

          # 创建启动脚本
          cat > "$RELEASE_DIR/start.sh" << 'SCRIPT'
#!/usr/bin/env bash
# Z-CPP 启动脚本 (Linux)
# 用法: ./start.sh [port]
set -euo pipefail

PORT="${1:-3000}"
DIR="$(cd "$(dirname "$0")" && pwd)"

cd "$DIR"
mkdir -p workspace

export ZCPP_MODE=production

echo "========================================="
echo "  Z-CPP 轻量级 C/C++ IDE"
echo "  端口: $PORT"
echo "  工作目录: $DIR/workspace"
echo "  浏览器打开: http://localhost:$PORT"
echo "========================================="
echo ""

exec "$DIR/z-cpp-backend" --port "$PORT"
SCRIPT
          chmod +x "$RELEASE_DIR/start.sh"

          # 打包
          tar czf "${RELEASE_DIR}.tar.gz" "$RELEASE_DIR/"
          echo "PACKAGE=${RELEASE_DIR}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: z-cpp-linux-x86_64
          path: backend/${{ env.PACKAGE }}
          retention-days: 7

  ###############################################################
  # Windows 构建 (x86_64)
  ###############################################################
  build-windows:
    name: Windows (x86_64)
    needs: build-frontend
    runs-on: windows-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM/Clang
        run: choco install llvm -y --no-progress --limit-output
        shell: powershell

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build backend (release)
        run: cargo build --release

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Assemble package
        shell: powershell
        run: |
          $releaseDir = "z-cpp-windows-x86_64"
          New-Item -ItemType Directory -Path "$releaseDir\frontend\dist" -Force | Out-Null
          New-Item -ItemType Directory -Path "$releaseDir\workspace" -Force | Out-Null

          # 拷贝后端二进制
          Copy-Item "target\release\z-cpp-backend.exe" "$releaseDir\"
          # 拷贝前端构建产物
          Copy-Item "frontend\dist\*" "$releaseDir\frontend\dist\" -Recurse
          # 拷贝 README
          Copy-Item "..\README.md" "$releaseDir\"

          # 创建启动脚本
          $batContent = @'
@echo off
REM Z-CPP 启动脚本 (Windows)
REM 用法: start.bat [port]

set PORT=%1
if "%PORT%"=="" set PORT=3000

cd /d "%~dp0"

if not exist workspace mkdir workspace

set ZCPP_MODE=production

echo ========================================
echo   Z-CPP 轻量级 C/C++ IDE
echo   端口: %PORT%
echo   工作目录: %CD%\workspace
echo   浏览器打开: http://localhost:%PORT%
echo ========================================
echo.

.\z-cpp-backend.exe --port %PORT%

if %ERRORLEVEL% NEQ 0 (
    echo.
    echo 程序异常退出，错误码: %ERRORLEVEL%
    pause
)
'@
          $batContent | Out-File -FilePath "$releaseDir\start.bat" -Encoding ASCII

          # 打包为 zip
          Compress-Archive -Path "$releaseDir\*" -DestinationPath "${releaseDir}.zip"
          echo "PACKAGE=${releaseDir}.zip" | Out-File -FilePath $env:GITHUB_ENV -Encoding ASCII -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: z-cpp-windows-x86_64
          path: backend/${{ env.PACKAGE }}
          retention-days: 7

  ###############################################################
  # GitHub Release (仅在打 tag 时触发)
  ###############################################################
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/z-cpp-linux-x86_64/*
            release-artifacts/z-cpp-windows-x86_64/*
          generate_release_notes: true
          draft: false
          prerelease: false
