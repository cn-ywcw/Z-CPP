# Z-CPP CI/CD — 自动构建 Windows & Linux 安装包
#
# 每次推送至 main 或创建 tag 时触发：
#   - 编译 Rust 后端（release 模式）
#   - 构建 React 前端（production 模式）
#   - 打包为平台专属压缩包（内含启动脚本）
#   - 上传为 GitHub Actions Artifact
#   - 打 tag 时自动发布为 GitHub Release（带使用说明）
#
# ⚠ 提交规范：每次修改代码后必须通过 SSH 推送至 GitHub

name: Build & Package

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "22"

jobs:
  # ============================================================
  # 前端构建
  # ============================================================
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ============================================================
  # Linux 构建 (x86_64)
  # ============================================================
  build-linux:
    name: Linux (x86_64)
    needs: build-frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      - name: Install GCC & Clang
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq g++ clang

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}

      - name: Build backend (release)
        run: cargo build --release

      - name: Download frontend
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Assemble package
        run: |
          PKG="z-cpp-linux-x86_64"
          mkdir -p "$PKG/frontend/dist" "$PKG/workspace"

          cp target/release/z-cpp-backend "$PKG/"
          cp -r ../frontend/dist/* "$PKG/frontend/dist/"
          cp ../README.md "$PKG/"
          cp ../scripts/start.sh "$PKG/"
          chmod +x "$PKG/start.sh"

          tar czf "${PKG}.tar.gz" "$PKG/"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-package
          path: backend/z-cpp-linux-x86_64.tar.gz
          retention-days: 7
          if-no-files-found: error

  # ============================================================
  # Windows 构建 (x86_64)
  # ============================================================
  build-windows:
    name: Windows (x86_64)
    needs: build-frontend
    runs-on: windows-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      - name: Install LLVM/Clang (optional)
        continue-on-error: true
        run: choco install llvm -y --no-progress --limit-output
        shell: powershell

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}

      - name: Build backend (release)
        run: cargo build --release

      - name: Download frontend
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Assemble package
        shell: powershell
        run: |
          $pkg = "z-cpp-windows-x86_64"
          New-Item -ItemType Directory -Path "$pkg\frontend\dist" -Force | Out-Null
          New-Item -ItemType Directory -Path "$pkg\workspace" -Force | Out-Null

          Copy-Item "target\release\z-cpp-backend.exe" "$pkg\"
          Copy-Item "..\frontend\dist\*" "$pkg\frontend\dist\" -Recurse
          Copy-Item "..\README.md" "$pkg\"
          Copy-Item "..\scripts\start.bat" "$pkg\"

          Compress-Archive -Path "$pkg\*" -DestinationPath "${pkg}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-package
          path: backend/z-cpp-windows-x86_64.zip
          retention-days: 7
          if-no-files-found: error

  # ============================================================
  # GitHub Release (仅在打 tag 时触发)
  # ============================================================
  release:
    name: Publish Release
    # 即使 Windows 构建失败也发布（仅 Linux 包）
    if: github.ref_type == 'tag' && !cancelled()
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Download Linux package
        uses: actions/download-artifact@v8
        with:
          name: linux-package
          path: release-files/

      - name: Download Windows package
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: windows-package
          path: release-files/

      - name: List release files
        run: ls -lh release-files/

      - name: Generate release body
        run: python3 scripts/gen-release-body.py

      - name: Prepare release files list
        run: |
          FILES=""
          if [ -f release-files/z-cpp-linux-x86_64.tar.gz ]; then
            echo "linux package found"
            FILES="release-files/z-cpp-linux-x86_64.tar.gz"
          fi
          if [ -f release-files/z-cpp-windows-x86_64.zip ]; then
            echo "windows package found"
            FILES="$FILES release-files/z-cpp-windows-x86_64.zip"
          fi
          echo "FILES=$FILES" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release-body.md
          files: ${{ env.FILES }}
          generate_release_notes: true
          draft: false
          prerelease: false
